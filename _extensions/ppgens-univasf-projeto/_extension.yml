title: PPGENS-UNIVASF — Projeto de Mestrado
subtitle: Modelo de Projeto de Pesquisa (Turma 2026) | Programa de Pós-Graduação em Ensino
author: Wennington
version: 0.1.0
quarto-required: ">=1.6.0"
contributes:
  formats:
    pdf:
      documentclass: scrreprt
      classoption:
        - 12pt
        - a4paper
        - openright
        - oneside
      papersize: a4
      pdf-engine: lualatex
      pdf-engine-opts:
        - "-shell-escape"
      number-sections: true
      secnumdepth: 3
      toc: true
      toc-depth: 3
      lof: false
      lot: false
      colorlinks: false
      linkcolor: black
      citecolor: black
      urlcolor: black
      fontfamily: libertinus
      fontsize: 12pt
      mainfont: "Libertinus Serif"
      sansfont: "Libertinus Sans"
      monofont: "Libertinus Mono"
      linestretch: 1.5
      geometry:
        - top=2cm
        - bottom=2cm
        - left=2cm
        - right=2cm
      indent: 1.25cm
      template-partials:
        - partials/title.tex
        - partials/before-body.tex
      cite-method: natbib
      biblio-style: abntex2-alf
      biblio-title: "REFERÊNCIAS"
